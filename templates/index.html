<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stock">
<title>Stock · Digital Stone</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="{{ url_for('static', filename='html5-qrcode.min.js') }}"></script>
</head>
<body>

<header class="topbar">
  <img src="{{ url_for('static', filename='logo.png') }}" class="brand" alt="">
  <div class="spacer"></div>
  <button id="refresh-btn" class="icon-btn" title="Actualizar catálogo" aria-label="Actualizar">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 11-3-6.7"></path><path d="M21 4v5h-5"></path>
    </svg>
  </button>
  <a href="/logout" class="icon-btn" title="Salir" aria-label="Salir">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path>
      <polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line>
    </svg>
  </a>
</header>

<div class="search-bar">
  <input
    id="q"
    type="search"
    inputmode="search"
    placeholder="Código de barras o nombre"
    autocomplete="off"
    autocapitalize="off"
    autocorrect="off"
    spellcheck="false">
  <button id="scan-btn" class="scan-btn" aria-label="Escanear código">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7V5a2 2 0 012-2h2"></path>
      <path d="M17 3h2a2 2 0 012 2v2"></path>
      <path d="M21 17v2a2 2 0 01-2 2h-2"></path>
      <path d="M7 21H5a2 2 0 01-2-2v-2"></path>
      <line x1="3" y1="12" x2="21" y2="12"></line>
    </svg>
  </button>
  <button id="clear-btn" class="clear-btn" aria-label="Limpiar" style="display:none;">✕</button>
</div>

<div id="status" class="status"></div>

<main id="results" class="results"></main>

<!-- Scanner overlay -->
<div id="scanner" class="scanner-overlay" hidden>
  <div class="scanner-top">
    <span>Apuntá al código de barras</span>
    <button id="scanner-close" aria-label="Cerrar">✕</button>
  </div>
  <div id="reader" class="reader"></div>
  <div class="scanner-bottom">
    <span id="scanner-status">Inicializando cámara…</span>
  </div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
