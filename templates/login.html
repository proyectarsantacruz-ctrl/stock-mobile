<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Ingresar · Stock</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0;
    padding: 20px;
    padding-top: env(safe-area-inset-top, 20px);
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }
  .card {
    background: white; color: #0f172a;
    padding: 36px 28px; border-radius: 18px;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    text-align: center;
  }
  .logo { max-width: 180px; max-height: 70px; margin-bottom: 8px; }
  h1 { font-size: 16px; margin: 12px 0 24px; color: #475569; font-weight: 500; }
  input {
    width: 100%; padding: 14px 16px; font-size: 16px;
    border: 1px solid #cbd5e1; border-radius: 12px;
    outline: none; transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.15); }
  button {
    width: 100%; margin-top: 14px; padding: 14px;
    background: #f97316; color: white; font-size: 16px; font-weight: 600;
    border: 0; border-radius: 12px; cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { background: #ea580c; }
  .error { color: #dc2626; font-size: 13px; margin-top: 14px; min-height: 18px; }
</style>
</head>
<body>
  <form class="card" method="POST" action="{{ url_for('login') }}">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Digital Stone" class="logo">
    <h1>Consulta de Stock</h1>
    <input type="password" name="password" placeholder="Contraseña" autofocus required
           autocapitalize="off" autocorrect="off" spellcheck="false">
    <button type="submit">Ingresar</button>
    <div class="error">{% if error %}{{ error }}{% endif %}</div>
  </form>
</body>
</html>
